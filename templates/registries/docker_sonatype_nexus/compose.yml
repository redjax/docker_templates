---
name: sonatype-nexus

# networks:
#   unnamed_net: {}

volumes:
  data: {}

services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    restart: unless-stopped
    ports:
      - ${NEXUS_HTTP_PORT:-8081}:8081
    volumes:
      - ${NEXUS_DATA_DIR:-data}:/nexus-data
    environment:
      NEXUS_CONTEXT: /
