---
name: sonatype-nexus

# networks:
#   unnamed_net: {}

volumes:
  data: {}

services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    restart: unless-stopped
    ports:
      - ${NEXUS_HTTP_PORT:-8081}:8081
      - ${NEXUS_REGISTRY_PORT:-5000}:5000
    volumes:
      - ${NEXUS_DATA_DIR:-data}:/nexus-data
    environment:
      NEXUS_CONTEXT: /
      NEXUS_PUBLIC_URL: ${NEXUS_PUBLIC_URL:-http://localhost:8081}
      NEXUS_SECURITY_RANDOMPASSWORD: ${NEXUS_RANDOM_PASSWORD:-true}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD}
      INSTALL4J_ADD_VM_PARAMS: -Xms${NEXUS_JAVA_XMS:-512m} -Xmx${NEXUS_JAVA_XMX:-1g} -XX:MaxDirectMemorySize=${NEXUS_JAVA_MAXMEMORYSIZE:-512m}
