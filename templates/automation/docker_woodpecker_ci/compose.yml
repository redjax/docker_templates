---
name: woodpecker

## Disable if using network_mode: host
networks:
  woodpecker_net:
    external: true

volumes:
  woodpecker-server-data: {}
  woodpecker-agent-config: {}

services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:${WOODPECKER_SERVER_IMG_TAG:-latest}
    container_name: woodpecker-server
    restart: unless-stopped
    ## Disable if using networks: mapping
    # network_mode: host
    ports:
      - ${WOODPECKER_HTTP_PORT:-8000}:8000
    volumes:
      - ${WOODPECKER_SERVER_DATA_DIR:-woodpecker-server-data}:/var/lib/woodpecker/
    environment:
      WOODPECKER_OPEN: ${WOODPECKER_OPEN:-false}
      WOODPECKER_ADMIN: ${FORGEJO_ADMIN_USERNAME}
      WOODPECKER_HOST: ${WOODPECKER_URL}
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET}

      WOODPECKER_FORGEJO_URL: ${WOODPECKER_FORGEJO_URL}
      WOODPECKER_FORGEJO: ${WOODPECKER_ENABLE_FORGEJO:-false}
      WOODPECKER_FORGEJO_TOKEN: ${WOODPECKER_FORGEJO_TOKEN}
      WOODPECKER_FORGEJO_CLIENT: ${WOODPECKER_FORGEJO_CLIENT}
      WOODPECKER_FORGEJO_SECRET: ${WOODPECKER_FORGEJO_SECRET}
    ## Disable if using network_mode: host
    networks:
      - woodpecker_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:${WOODPECKER_AGENT_IMG_TAG:-latest}
    container_name: woodpecker-agent
    ## Disable if using networks: mapping
    # network_mode: host
    command: agent
    restart: unless-stopped 
    depends_on:
      - woodpecker-server
    volumes:
      - ${WOODPECKER_AGENT_CONFIG_DIR:-woodpecker-agent-config}:/etc/woodpecker
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET}
    ## Disable if using network_mode: host
    networks:
      - woodpecker_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
