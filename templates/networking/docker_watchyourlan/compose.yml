# networks:
#   watchyourlan-net:
#     external: false

volumes:
  grafana_data:
  watchyourlan_data:

services:
  watchyourlan:
    image: aceberg/watchyourlan:v2
    container_name: watchyourlan
    restart: unless-stopped
    environment:
      IFACES: ${WYL_IFACES:-enp2s0}
      TZ: ${TZ:-Etc/UTC}
    network_mode: "host"
    ports:
      - ${WYL_HTTP_PORT:-8840}:8840
    volumes:
      - ${WYL_DATA_DIR:-watchyourlan_data}:/data/WatchYourLan
#     networks:
#       - watchyourlan-net

  influxdb:
    image: influxdb:2
    container_name: ${INFLUXDB_CONTAINER_NAME:-influxdb}
    restart: unless-stopped
    ports:
      - ${INFLUXDB_HTTP_PORT:-8086}:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE: ${INFLUXDB_INIT_MODE:-setup}
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD:-influxAdmin}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_INIT_ORG:-influxDefault}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_INIT_BUCKET:-influxDefaultBucket}
    volumes:
      - ${INFLUXDB_DATA_DIR:-./data/influxdb}:/var/lib/influxdb2
      - ${INFLUXDB_CONFIG_DIR:-./config/influxdb}:/etc/influxdb2
#     networks:
#
#        - watchyourlan-net

