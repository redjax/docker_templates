# Load modules
module(load="imudp")  # UDP syslog reception
module(load="imtcp")  # TCP syslog reception
input(type="imudp" port="514")
input(type="imtcp" port="514")

# Docker container logs to separate files
$template DockerContainerLogFileName,"/var/log/rsyslog/docker/%$year%/%$month%/%HOSTNAME%/%programname%.log"

if $programname == 'unifi-app' then {
    action(type="omfile" 
           file="/var/log/rsyslog/unifi-app.log"
           template="RSYSLOG_TraditionalFileFormat")
    stop
}

# All other logs
*.* /var/log/rsyslog/all.log

# File permissions
$FileCreateMode 0644
$DirCreateMode 0755

