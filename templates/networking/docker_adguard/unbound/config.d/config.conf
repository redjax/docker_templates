server:
  ## Set to 0 for silent
  verbosity: 1
  ## Do not leave this enabled
  log-queries: no
  ## Log upstream failures
  log-servfail: yes
  ## Do not leave this enabled. Logs
  #  upstream events locally
  log-local-actions: no

  interface: 0.0.0.0
  port: 53

  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes

  num-threads: 4

  hide-identity: yes
  hide-version: yes

  qname-minimisation: yes
  aggressive-nsec: yes

  prefetch: yes
  prefetch-key: yes

  edns-buffer-size: 1232

  cache-min-ttl: 300
  cache-max-ttl: 86400

  msg-cache-size: 128m
  rrset-cache-size: 256m

  so-rcvbuf: 0
  so-sndbuf: 0

