server:
  interface: 0.0.0.0
  port: 53

  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes

  num-threads: 4

  hide-identity: yes
  hide-version: yes

  qname-minimisation: yes
  aggressive-nsec: yes

  prefetch: yes
  prefetch-key: yes

  edns-buffer-size: 1232

  cache-min-ttl: 300
  cache-max-ttl: 86400

  msg-cache-size: 128m
  rrset-cache-size: 256m

  so-rcvbuf: 0
  so-sndbuf: 0

