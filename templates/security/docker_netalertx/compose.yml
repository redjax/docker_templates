---
name: netalertx

volumes:
  data: {}

services:
  netalertx:
    container_name: netalertx
    image: ghcr.io/netalertx/netalertx:${NETALERTX_IMG_TAG:-26}
    network_mode: ${NETALERTX_NETWORK_MODE:-host}
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    volumes:
      - ${NETALERTX_DATA_DIR:-data}:/data
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp:uid=20211,gid=20211,mode=1700,rw,noexec,nosuid,nodev,async,noatime,nodiratime
    environment:
      TZ: ${TZ:-Etc/UTC}
      PORT: ${NETALERTX_PORT:-20211}
      GRAPHQL_PORT: ${NETALERTX_GRAPHQL_PORT:-20212}
      API_TOKEN: ${NETALERTX_API_TOKEN}
      LISTEN_ADDR: ${NETALERTX_LISTEN_ADDRESS:-0.0.0.0}
      SCAN_SUBNETS: ${NETALERTX_SCAN_SUBNETS:-192.168.1.0/24 --interface=enp2s0}
    mem_limit: 2048m
    mem_reservation: 1024m
    cpu_shares: 512
    pids_limit: 512
    logging:
      options:
        max-size: "10m"
        max-file: "3"
