---
name: netalertx

volumes:
  data: {}

services:
  netalertx:
    image: "ghcr.io/netalertx/netalertx:${NETALERTX_IMG_TAG:-26}"
    container_name: netalertx
    network_mode: "host"
    restart: unless-stopped
    hostname: ${NETALERTX_HOSTNAME:-netalertx}
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    volumes:
      - ${NETALERTX_DATA_DIR:-data}:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ:-Etc/UTC}
      PORT: ${NETALERTX_PORT:-20211}
      LISTEN_ADDR: ${NETALERTX_LISTEN_ADDRESS:-0.0.0.0}
      ## Cannot use LOADED_PLUGINS with APP_CONF_OVERRIDE
      ## Default: (none/empty)
      # LOADED_PLUGINS: '${NETALERTX_LOADED_PLUGINS:-["ARPSCAN","AVAHISCAN","INTRNT","UI"]}'
    mem_limit: 2048m
    mem_reservation: 1024m
    cpu_shares: 512
    pids_limit: 512
    logging:
      options:
        max-size: "10m"
        max-file: "3"
