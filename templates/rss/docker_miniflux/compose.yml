---
name: miniflux

services:
  miniflux:
    image: miniflux/miniflux:${MINIFLUX_IMG_TAG:-latest}
    container_name: miniflux
    restart: unless-stopped
    ports:
      - ${MINIFLUX_HTTP_PORT:-8080}:8080
    environment:
      DATABASE_URL: postgres://${PG_USER:-miniflux}:${PG_PASSWORD:-miniflux}@${PG_HOST:-db}:${PG_PORT:-5432}/${PG_DB:-miniflux}?sslmode=disable
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      CREATE_ADMIN: ${CREATE_ADMIN:-0}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-minifluxAdmin!}
      POLLING_FREQUENCY: ${POLLING_FREQUENCY:-60}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      FETCHER_ALLOW_PRIVATE_NETWORKS: ${ALLOW_PRIVATE_NETWORKS:-0}
