---
networks:
  commafeed_net: {}

services:
  commafeed:
    image: athou/commafeed:latest-postgresql
    container_name: commafeed
    restart: unless-stopped
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgresql:5432/commafeed
      - QUARKUS_DATASOURCE_USERNAME=${COMMAFEED_USER:-commafeed}
      - QUARKUS_DATASOURCE_PASSWORD=${COMMAFEED_PASSWORD:-commafeed}
    deploy:
      resources:
        limits:
          memory: ${COMMAFEED_MEMORY:-256M}
    ports:
      - ${COMMAFEED_HTTP_PORT:-8082}:8082

  postgresql:
    image: postgres:latest
    container_name: commafeed-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${COMMAFEED_USER:-commafeed}
      POSTGRES_PASSWORD: ${COMMAFEED_PASSWORD:-commafeed}
      POSTGRES_DB: ${COMMAFEED_DB_DATABASE:-commafeed}
    volumes:
      - ${COMMAFEED_DB_DIR:-./commafeed/db/data}:/var/lib/postgresql/data
