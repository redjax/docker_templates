---
name: forgejo

networks:
  forgejo_net: {}

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:${FORGEJO_IMG_VER:-15}
    restart: always
    env_file:
      - ${FORGEJO_ENV_FILE:-./env_files/forgejo/default.env}
    environment:
      USER_UID: ${FORGEJO_UUID:-1000}
      USER_GID: ${FORGEJO_GUID:-1000}
    volumes:
      - ${FORGEJO_DATA_DIR:-./data/forgejo}:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - ${FORGEJO_WEBUI_PORT:-3000}:3000
      - ${FORGEJO_SSH_PORT:-222}:22
    networks:
      - forgejo_net
