---
name: tududi

volumes:
  tududi_db: {}
  tududi_uploads: {}

services:
  tududi:
    image: chrisvel/tududi:latest
    container_name: tududi
    restart: unless-stopped
    environment:
      - TUDUDI_USER_EMAIL=${TUDUDI_USER_EMAIL:-admin@example.com}
      - TUDUDI_USER_PASSWORD=${TUDUDI_USER_PASSWORD:-tududiadmin}
      - TUDUDI_SESSION_SECRET=${TUDUDI_SESSION_SECRET}
      - TUDUDI_ALLOWED_ORIGINS=${TUDUDI_ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - ${TUDUDI_DB_DIR:-tududi_db}:/app/backend/db
      - ${TUDUDI_UPLOADS_DIR:-tududi_uploads}:/app/backend/uploads
    ports:
      - ${TUDUDI_HTTP_PORT:-3002}:3002
