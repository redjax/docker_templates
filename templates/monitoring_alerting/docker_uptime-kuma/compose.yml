---
volumes:
  uptime_kuma_data:

services:
  uptime-kuma:
    image: louislam/uptime-kuma:${UPTIME_KUMA_IMG_TAG:-2}
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - ${UPTIME_KUMA_PORT:-3001}:3001
    volumes:
      - ${UPTIME_KUMA_DATA_DIR:-uptime_kuma_data}:/app/data
