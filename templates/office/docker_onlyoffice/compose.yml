---
# networks:
#   unnamed_net: {}

volumes:
  onlyoffice_logs: {}
  onlyoffice_data: {}
  onlyoffice_lib: {}
  onlyoffice_rabbitmq: {}
  onlyoffice_redis: {}
  onlyoffice_db: {}

services:
  onlyoffice:
    image: onlyoffice/documentserver
    container_name: onlyoffice
    restart: unless-stopped
    environment:
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
    ports:
      - ${ONLYOFFICE_WEBUI_PORT:-80}:80
    volumes:
      - ${ONLYOFFICE_LOGS_DIR:-onlyoffice_logs}:/var/log/onlyoffice
      - ${ONLYOFFICE_DATA_DIR:-onlyoffice_data}:/var/www/onlyoffice/Data
      - ${ONLYOFFICE_LIB_DIR:-onlyoffice_lib}:/var/lib/onlyoffice
      - ${ONLYOFFICE_RABBITMQ_DIR:-onlyoffice_rabbitmq}:/var/lib/rabbitmq
      - ${ONLYOFFICE_REDIS_DIR:-onlyoffice_redis}:/var/lib/redis
      - ${ONLYOFFICE_DB:-onlyoffice_db}:/var/lib/postgresql
