---
name: jellyfin

volumes:
  config: {}
  cache: {}

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${JELLYFIN_HTTP_PORT:-8096}:8096/tcp"
      - "${JELLYFIN_HTTPS_PORT:-8920}:8920/tcp"
      - "${JELLYFIN_CLIENT_DISCOVERY_PORT:-7359}:7359/udp"
    volumes:
      # Persistent app data
      - "${JELLYFIN_CONFIG_DIR:-config}:/config"
      - "${JELLYFIN_CACHE_DIR:-cache}:/cache"
      # Media root
      - type: bind
        source: "${JELLYFIN_MEDIA_ROOT}"
        target: /media
        read_only: true
    environment:
      JELLYFIN_PublishedServerUrl: "${JELLYFIN_SERVER_URL:-http://localhost:8096}"
    ## Optional hardware acceleration:
    # devices:
    #   - /dev/dri:/dev/dri
