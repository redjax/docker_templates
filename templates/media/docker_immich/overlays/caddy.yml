---
name: immich

volumes:
  caddy_data: {}
  caddy_config: {}

services:
  caddy:
    image: caddy:latest
    container_name: immich_caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      # - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile
      - ${CADDY_DATA_DIR:-caddy_data}:/data
      - ${CADDY_CONFIG_DIR:-caddy_config}:/config
